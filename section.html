<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <nav class="premium-nav sticky top-0 z-50 px-6 py-4 w-full flex justify-between items-center border-b border-sky-100">
        <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
            <div id="secret-logo-zone" class="cursor-pointer select-none transition-transform active:scale-90">
                <img src="https://images.vrm.dev/i/2026/07/02/IMG_20260625232806901.jpg" alt="FROXX" class="w-12 h-12 rounded-2xl object-cover shadow-md border-2 border-sky-400/20">
            </div>
            <a href="index.html" class="text-xs font-bold tracking-wider text-sky-600 hover:text-sky-700 uppercase transition">&larr; Return Home</a>
        </div>
    </nav>

    <main class="max-w-6xl w-full mx-auto px-6 py-12 flex-grow space-y-8">
        <div class="space-y-2 border-b border-slate-100 pb-6">
            <h1 id="directory-title" class="text-3xl font-black uppercase tracking-tight text-slate-900">Directory Loading...</h1>
            <p class="text-xs text-slate-400 font-medium">Browse published production config logs, presets, and customized XML project blueprints.</p>
        </div>

        <div id="filter-wrapper" class="hidden flex-wrap gap-2 py-1">
            </div>

        <div id="assets-display-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

        <div id="empty-directory-placeholder" class="hidden text-center py-24 space-y-3">
            <div class="text-4xl text-sky-400/30">📦</div>
            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">No assets inside this archive</h3>
            <p class="text-xs text-slate-400 max-w-xs mx-auto">Assets haven't been published to this folder container yet via your custom control panel deck.</p>
        </div>
    </main>

    <footer class="w-full bg-white border-t border-slate-100 py-6 text-center text-xs text-slate-400 font-medium">
        &copy; 2026 FROXX愛. Structured intentionally.
    </footer>

    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/section.js"></script>
